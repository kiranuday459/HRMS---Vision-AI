spring.application.name=hr
# =============================================
# Database Configuration (Active)
# =============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Server
# =============================================
server.port=${SERVER_PORT:8080}

# =============================================
# File Upload Configuration
# =============================================
file.upload-dir=${FILE_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# Mail Configuration (Microsoft Graph API)
# =============================================
azure.activedirectory.tenant-id=${AZURE_TENANT_ID}
azure.activedirectory.client-id=${AZURE_CLIENT_ID}
azure.activedirectory.client-secret=${AZURE_CLIENT_SECRET}
azure.activedirectory.sender-email=${AZURE_SENDER_EMAIL}

